# multiplexor — user configuration
# Copy this file to:
#   Linux/macOS: ~/.config/multiplexor/config.yaml
#   Windows:     %USERPROFILE%\.multiplexor\config.yaml
#
# Values shown are defaults. Uncomment and modify as needed.

providers:
  claude:
    enabled: true
    command: "claude"
    priority: 90
    fallback_only: false
    credits_hint: unknown

  codex:
    enabled: true
    command: "codex"
    priority: 85
    fallback_only: false
    credits_hint: unknown

  gemini:
    enabled: true
    command: "gemini"
    priority: 75
    fallback_only: false
    credits_hint: unknown

  ollama:
    enabled: true
    command: "ollama"
    priority: 30
    fallback_only: true
    default_model: "llama3.2:3b"

  openrouter:
    enabled: true
    command: "openrouter"
    priority: 80
    fallback_only: false
    credits_hint: unknown

  hermes:
    enabled: true
    command: "hermes chat"
    priority: 60
    fallback_only: false
    credits_hint: unknown

  opencode:
    enabled: true
    command: "opencode"
    priority: 55
    fallback_only: false
    credits_hint: unknown

routing:
  default_profile: "balanced"
