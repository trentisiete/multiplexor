# NOTE: this file is duplicated at multiplexor/config.example.yaml so the
# installed package ships its own copy (see pyproject.toml package-data).
# Keep both in sync when adding or modifying providers — the package one is
# what end users see; the root one is what the test suite reads.

routing:
  exhausted_cooldown_hours: 24
  ask_timeout_seconds: 120

tiers:
  free:
    bonus: 30
  included:
    bonus: 25
  local:
    bonus: 5
  paid:
    bonus: 0

providers:
  gemini:
    enabled: true
    tier: free
    priority: 100
    command: "gemini"
    interactive_command:
      - "gemini"
      - "--skip-trust"
      - "--approval-mode=yolo"
    ask_command:
      - "gemini"
      - "--skip-trust"
      - "--approval-mode=yolo"
      - "-p"
      - ""
    ask_stdin: true

  qwen:
    enabled: false
    tier: paid
    priority: 95
    command: "qwen"
    interactive_command:
      - "qwen"
    ask_command:
      - "qwen"
      - "-p"
      - "{prompt}"

  opencode:
    enabled: true
    tier: included
    priority: 90
    command: "opencode"
    interactive_command:
      - "opencode"
    ask_command:
      - "opencode"
      - "run"
      - "--dangerously-skip-permissions"
    ask_stdin: true

  hermes:
    enabled: false
    tier: paid
    priority: 80
    command: "hermes"
    interactive_command:
      - "hermes"
      - "chat"
    ask_command:
      - "hermes"
      - "chat"
      - "-q"
      - "{prompt}"

  ollama:
    enabled: true
    tier: local
    priority: 10
    fallback_only: true
    command: "ollama"
    default_model: "llama3.2:3b"
    interactive_command:
      - "ollama"
      - "run"
      - "llama3.2:3b"
    ask_command:
      - "ollama"
      - "run"
      - "llama3.2:3b"
      - "{prompt}"

  codex:
    enabled: false
    tier: paid
    priority: 40
    command: "codex"
    interactive_command:
      - "codex"
    ask_command:
      - "codex"
      - "exec"
      - "{prompt}"

  cmd:
    # CommandCode (Kimi K2.6 backend). ~€1 buys a lot of work; cheapest of the
    # paid CLIs that integrate with endy. Disabled by default — the v1 focus
    # is free tiers, paid providers opt in. Notes:
    #   - cmd has no --model CLI flag (set globally via `cmd model` or /model).
    #   - cmd -p must be the LAST flag (everything after is the prompt).
    #   - --yolo is required for unattended runs (auto-approve).
    #   - --max-turns is undocumented but accepted, defaults to 10 — endy
    #     overrides to 200 inside its own spawn-long-task.sh.
    enabled: false
    tier: paid
    priority: 60
    command: "cmd"
    interactive_command:
      - "cmd"
    ask_command:
      - "cmd"
      - "--skip-onboarding"
      - "--trust"
      - "--yolo"
      - "-p"
      - "{prompt}"

  claude:
    enabled: false
    tier: paid
    priority: 30
    command: "claude"
    interactive_command:
      - "claude"
    ask_command:
      - "claude"
      - "-p"
      - "{prompt}"
