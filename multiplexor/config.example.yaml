routing:
  exhausted_cooldown_hours: 24
  ask_timeout_seconds: 120

tiers:
  free:
    bonus: 30
  included:
    bonus: 25
  local:
    bonus: 5
  paid:
    bonus: 0

providers:
  gemini:
    enabled: true
    tier: free
    priority: 100
    command: "gemini"
    interactive_command:
      - "gemini"
      - "--skip-trust"
      - "--approval-mode=yolo"
    ask_command:
      - "gemini"
      - "--skip-trust"
      - "--approval-mode=yolo"
      - "-p"
      - ""
    ask_stdin: true

  qwen:
    enabled: false
    tier: paid
    priority: 95
    command: "qwen"
    interactive_command:
      - "qwen"
    ask_command:
      - "qwen"
      - "-p"
      - "{prompt}"

  opencode:
    enabled: true
    tier: included
    priority: 90
    command: "opencode"
    interactive_command:
      - "opencode"
    ask_command:
      - "opencode"
      - "run"
      - "--dangerously-skip-permissions"
    ask_stdin: true

  hermes:
    enabled: false
    tier: paid
    priority: 80
    command: "hermes"
    interactive_command:
      - "hermes"
      - "chat"
    ask_command:
      - "hermes"
      - "chat"
      - "-q"
      - "{prompt}"

  ollama:
    enabled: true
    tier: local
    priority: 10
    fallback_only: true
    command: "ollama"
    default_model: "llama3.2:3b"
    interactive_command:
      - "ollama"
      - "run"
      - "llama3.2:3b"
    ask_command:
      - "ollama"
      - "run"
      - "llama3.2:3b"
      - "{prompt}"

  codex:
    enabled: false
    tier: paid
    priority: 40
    command: "codex"
    interactive_command:
      - "codex"
    ask_command:
      - "codex"
      - "exec"
      - "{prompt}"

  claude:
    enabled: false
    tier: paid
    priority: 30
    command: "claude"
    interactive_command:
      - "claude"
    ask_command:
      - "claude"
      - "-p"
      - "{prompt}"
